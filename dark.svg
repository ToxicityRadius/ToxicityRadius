      <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#fff" stop-opacity=".06"/><stop offset=".45" stop-color="#22D3EE" stop-opacity=".7"/><stop offset=".55" stop-color="#A78BFA" stop-opacity=".75"/><stop offset="1" stop-color="#fff" stop-opacity=".06"/><animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/><animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/></linearGradient>
